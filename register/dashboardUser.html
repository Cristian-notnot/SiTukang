<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard User - SiTukang</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f5f5;
}

.navbar{
    width:100%;
    background:#c2185b;

    color:white;

    padding:15px 30px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logout-btn{
    background:white;
    color:#c2185b;

    border:none;

    padding:10px 18px;

    border-radius:30px;

    cursor:pointer;

    font-weight:600;
}

.container{
    padding:30px;
}

.welcome-card{
    background:white;

    padding:30px;

    border-radius:20px;

    box-shadow:0 10px 20px rgba(0,0,0,0.08);

    margin-bottom:25px;
}

.welcome-card h1{
    color:#c2185b;
    margin-bottom:10px;
}

.grid{
    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;
}

.card{
    background:white;

    padding:25px;

    border-radius:20px;

    box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

.card h3{
    color:#c2185b;
    margin-bottom:10px;
}

.card p{
    color:#666;
    font-size:14px;
}

.btn-pesan{
    margin-top:15px;

    background:#c2185b;
    color:white;

    border:none;

    padding:10px 15px;

    border-radius:30px;

    cursor:pointer;
}

</style>
</head>

<body>

<div class="navbar">

    <h2>Dashboard User</h2>

    <button
        class="logout-btn"
        onclick="logout()">

        Logout

    </button>

</div>

<div class="container">

    <div class="welcome-card">

        <h1 id="namaUser">
            Halo User
        </h1>

        <p id="emailUser"></p>

    </div>

    <div class="grid">

        <div class="card">

            <h3>Tukang Bangunan</h3>

            <p>
                Jasa pembangunan rumah,
                renovasi, dan perbaikan.
            </p>

            <button class="btn-pesan">
                Pesan Sekarang
            </button>

        </div>

        <div class="card">

            <h3>Tukang Listrik</h3>

            <p>
                Instalasi listrik dan
                perbaikan kelistrikan.
            </p>

            <button class="btn-pesan">
                Pesan Sekarang
            </button>

        </div>

        <div class="card">

            <h3>Tukang Ledeng</h3>

            <p>
                Perbaikan pipa dan
                saluran air rumah.
            </p>

            <button class="btn-pesan">
                Pesan Sekarang
            </button>

        </div>

    </div>

</div>

<script>

// cek login
const user =
JSON.parse(localStorage.getItem("loggedInUser"));

if(!user){

    window.location.href =
    "../login/loginUser.html";
}

// tampilkan data user
document.getElementById("namaUser")
.innerText = "Halo, " + user.nama;

document.getElementById("emailUser")
.innerText = user.email;


// logout
function logout(){

    localStorage.removeItem("loggedInUser");

    window.location.href =
    "../login/loginUser.html";
}

</script>

</body>
</html>
