<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <style>
        body { margin: 0;
            font-family: Arial;
            background: #7b0f3a;}
        .container {
            display: flex;
            width: 800px;
            height: 520px;
            margin: 50px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            background: white;}
        .left {
            width: 40%;
            background: linear-gradient(135deg, #c2185b, #f06292);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;}

        .left h2 {
            margin: 10px 0;}
        .right {
            width: 60%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;}
        .right h2 {
            text-align: center;
            margin-bottom: 20px;}

        .input-group {
            margin-bottom: 15px;}

        .input-group input {
            width: 100%;
            padding: 10px;
            border: none;
            border-bottom: 1px solid #ccc;
            outline: none;}

        .btn {
            background: #c2185b;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;}

        .btn:hover {
            background: #a3154d;}

        .link {
            margin-top: 10px;
            text-align: center; }

        .link a {
            text-decoration: none;
            color: #c2185b;}
    </style>
</head>
<body>

<div class="container">

    <!-- KIRI -->
    <div class="left">
        <h2>JOIN US</h2>
        <p>Buat akun baru</p>
    </div>

    <!-- KANAN -->
    <div class="right">
        <h2>SIGN UP</h2>

        <form method="POST" action="/signup">

            <div class="input-group">
                <input type="text" name="nama" placeholder="Nama Lengkap" required>
            </div>

            <div class="input-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button class="btn">Daftar</button>

        </form>

        <div class="link">
            <p>Sudah punya akun? <a href="../login/login.html">Login</a></p>
        </div>
    </div>

</div>

</body>
</html>
