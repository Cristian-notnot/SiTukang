<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SiTukang</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #7b0f3a, #e0407b);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            display: flex;
            width: 900px;
            max-width: 95%;
            min-height: 500px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            background: white;
        }
        .left {
            width: 40%;
            background: linear-gradient(135deg, #f8db4c, #f06292);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
            text-align: center;
        }
        .right {
            width: 60%;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .right h2 {
            margin-bottom: 30px;
            color: #c2185b;
            font-weight: 600;
            font-size: 28px;
        }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group input {
            width: 100%;
            padding: 12px 5px;
            border: none;
            border-bottom: 2px solid #eee;
            outline: none;
            transition: 0.3s;
            font-size: 15px;
        }
        .input-group input:focus { border-bottom-color: #e2e618; }
        .btn-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .btn {
            background: #c2185b;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: 16px;
        }
        .btn:hover { background: #a3154d; transform: translateY(-2px); }
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            color: #555;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }
        .google-btn:hover { background: #f9f9f9; border-color: #bbb; }
        .link { margin-top: 20px; font-size: 14px; text-align: center; color: #666; }
        .link a { color: #c2185b; text-decoration: none; font-weight: 600; }
        .divider { text-align: center; margin: 15px 0; color: #aaa; font-size: 12px; position: relative; }
        .divider::before, .divider::after { content: ""; height: 1px; width: 30%; background: #eee; position: absolute; top: 50%; }
        .divider::before { left: 0; } .divider::after { right: 0; }

        @media (max-width: 768px) {
            .container { flex-direction: column; width: 400px; }
            .left, .right { width: 100%; padding: 30px; }
            .left { display: none; } 
        }
    </style>
</head>
<body>
<div class="container">
    <div class="left">
        <h2 style="font-size: 32px;">SELAMAT DATANG</h2>
        <p>Masuk untuk mulai mencari tukang.</p>
    </div>
    <div class="right">
        <h2>Login</h2>
        <form method="POST" action="/login">
            <div class="input-group">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <div class="btn-container">
                <button type="submit" class="btn">Masuk Sekarang</button>
            </div>
        </form>
        <div class="divider">ATAU</div>
        <a href="#" class="google-btn">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20" style="margin-right:10px"> 
            Login dengan Google
        </a>
        <div class="link">
            Belum punya akun? <a href="../singup/singup.html">Daftar di sini</a>
        </div>
    </div>
</div>
</body>
</html>
