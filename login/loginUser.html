<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login User - SiTukang</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#7b0f3a,#e0407b);

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.container{
    width:450px;
    background:white;

    border-radius:20px;

    overflow:hidden;

    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.header{
    background:linear-gradient(135deg,#f8db4c,#f06292);

    padding:30px;

    text-align:center;

    color:white;
}

.header h1{
    margin-top:10px;
}

.form-section{
    padding:35px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;

    color:#555;
}

.input-group input{
    width:100%;

    padding:12px;

    border:2px solid #eee;

    border-radius:10px;

    outline:none;
}

.input-group input:focus{
    border-color:#c2185b;
}

.btn{
    width:100%;

    background:#c2185b;

    color:white;

    border:none;

    padding:14px;

    border-radius:30px;

    cursor:pointer;

    font-size:16px;
    font-weight:600;
}

.link{
    text-align:center;
    margin-top:20px;
}

.link a{
    color:#c2185b;
    text-decoration:none;
    font-weight:600;
}

.error-message{
    background:#ffebee;
    color:#c62828;

    padding:12px;

    border-radius:10px;

    margin-bottom:15px;

    display:none;

    text-align:center;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">

        <h1>Login User</h1>

        <p>
            Masuk untuk memesan jasa tukang
        </p>

    </div>

    <div class="form-section">

        <form id="loginUserForm">

            <div id="errorMessage"
                 class="error-message">
            </div>

            <div class="input-group">

                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    required>

            </div>

            <button type="submit" class="btn">
                Login Sekarang
            </button>

        </form>

        <div class="link">

            Belum punya akun?

            <a href="../registerUser/registerUser.html">
                Register
            </a>

        </div>

    </div>

</div>

<script>

document
.getElementById("loginUserForm")

.addEventListener("submit", function(e){

    e.preventDefault();

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;


    const users =
    JSON.parse(localStorage.getItem("users")) || [];


    const user =
    users.find(u =>
        u.email === email &&
        u.password === password
    );


    if(user){

        localStorage.setItem(
            "loggedInUser",
            JSON.stringify(user)
        );

        window.location.href =
        "../dashboardUser/dashboardUser.html";

    }else{

        const error =
        document.getElementById("errorMessage");

        error.style.display = "block";

        error.innerText =
        "Email atau password salah";
    }

});

</script>

</body>
</html>
