<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Si Tukang</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #2c7be5;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #1a5edb;
    }
    .footer {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Login Si Tukang</h2>
  
  <form onsubmit="return login()">
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Masuk</button>
  </form>

  <div class="footer">Aplikasi Jasa Tukang</div>
</div>

<script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  // Dummy login
  if(user === "admin" && pass === "123") {
    alert("Login berhasil!");
  } else {
    alert("Username atau password salah!");
  }

  return false; // biar tidak reload
}
</script>

</body>
</html>
