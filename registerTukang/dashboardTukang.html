<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Tukang - SiTukang</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{background:#f5f5f5;}

    .navbar{
      width:100%;
      background:#c2185b;
      color:#fff;
      padding:15px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
    }

    .logout-btn{
      background:#fff;
      color:#c2185b;
      border:none;
      padding:10px 18px;
      border-radius:30px;
      cursor:pointer;
      font-weight:600;
      white-space:nowrap;
    }

    .container{padding:30px;max-width:1100px;margin:0 auto;}

    .welcome-card{
      background:#fff;
      padding:25px;
      border-radius:20px;
      box-shadow:0 10px 20px rgba(0,0,0,0.08);
      margin-bottom:20px;
    }

    .welcome-card h1{color:#c2185b;margin-bottom:8px;font-size:22px;}
    .meta{color:#555;line-height:1.6;font-size:14px;}

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap:18px;
      margin-top:16px;
    }

    .card{
      background:#fff;
      padding:22px;
      border-radius:20px;
      box-shadow:0 10px 20px rgba(0,0,0,0.08);
    }

    .card h3{color:#c2185b;margin-bottom:10px;font-size:16px;}
    .card p{color:#666;font-size:14px;line-height:1.5;}

    .price-list{margin-top:12px;display:flex;flex-direction:column;gap:10px;}
    .price-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px 12px;
      border-radius:14px;
      background:#fafafa;
      border:1px solid #f0f0f0;
    }
    .price-item span:first-child{color:#555;font-size:13px;}
    .price-item span:last-child{color:#c2185b;font-weight:700;font-size:13px;}

    .btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;}
    .btn{
      border:none;
      cursor:pointer;
      border-radius:30px;
      padding:10px 16px;
      font-weight:600;
      transition:0.2s;
    }
    .btn-primary{background:#c2185b;color:#fff;}
    .btn-primary:hover{background:#a3154d;}

    @media (max-width: 768px){
      .container{padding:16px;}
      .navbar{padding:12px 16px;}
    }
  </style>
</head>
<body>

  <div class="navbar">
    <h2>Dashboard Tukang</h2>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </div>

  <div class="container">
    <div class="welcome-card">
      <h1 id="namaUser">Halo, Tukang</h1>
      <div class="meta">
        <div><strong>Email:</strong> <span id="emailUser">-</span></div>
        <div><strong>Keahlian Utama:</strong> <span id="skillUser">-</span></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" type="button" onclick="refreshPage()">Refresh Data</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Detail Keahlian</h3>
        <p id="descSkill">-</p>
      </div>

      <div class="card">
        <h3>Harga per Hari</h3>
        <div class="price-list" id="priceList">
          <!-- injected by JS -->
        </div>
      </div>

      <div class="card">
        <h3>Catatan</h3>
        <p>
          Dashboard ini membaca data dari <code>localStorage.currentTukang</code>.
          Jika data kosong, halaman akan mengarahkan ke login.
        </p>
      </div>
    </div>
  </div>

  <script>
    function formatRupiah(n){
      const num = Number(n) || 0;
      return new Intl.NumberFormat('id-ID').format(num);
    }

    function getTukangFromStorage(){
      try {
        return JSON.parse(localStorage.getItem('currentTukang'));
      } catch(e){
        return null;
      }
    }

    function redirectToLogin(){
      window.location.href = '../login/loginTukang.html';
    }

    function setText(id, value){
      const el = document.getElementById(id);
      if(el) el.textContent = value ?? '-';
    }

    function renderPrices(hargaPerHari){
      const priceList = document.getElementById('priceList');
      if(!priceList) return;

      const mapping = [
        { key: 'bangunan', label: 'Bangunan' },
        { key: 'listrik', label: 'Listrik' },
        { key: 'ledeng', label: 'Ledeng (Pipa)' },
        { key: 'cat', label: 'Cat' },
        { key: 'ac', label: 'AC' },
        { key: 'lainnya', label: 'Lainnya' }
      ];

      priceList.innerHTML = '';
      mapping.forEach(item => {
        const val = (hargaPerHari && hargaPerHari[item.key] != null) ? hargaPerHari[item.key] : 0;
        const row = document.createElement('div');
        row.className = 'price-item';
        row.innerHTML = `<span>${item.label}</span><span>Rp ${formatRupiah(val)}/hari</span>`;
        priceList.appendChild(row);
      });
    }

    function refreshPage(){
      window.location.reload();
    }

    // Init
    const currentTukang = getTukangFromStorage();
    if(!currentTukang){
      alert('Silakan login terlebih dahulu!');
      redirectToLogin();
    }

    const nama = currentTukang?.nama || currentTukang?.namaLengkap || '-';
    const email = currentTukang?.email || '-';
    const skillUtama = currentTukang?.keahlian_utama || currentTukang?.keahlian || '-';

    setText('namaUser', `Halo, ${nama}`);
    setText('emailUser', email);
    setText('skillUser', skillUtama);

    const desc = `Anda terdaftar sebagai: ${skillUtama}.`;
    const descEl = document.getElementById('descSkill');
    if(descEl) descEl.textContent = desc;

    // harga bisa ada di format: harga_per_hari
    renderPrices(currentTukang?.harga_per_hari);

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('currentTukang');
      window.location.href = '../login/loginTukang.html';
    });
  </script>

</body>
</html>
