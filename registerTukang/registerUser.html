<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registrasi User - SiTukang</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#7b0f3a,#e0407b);
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.container{
    width:500px;
    max-width:100%;

    background:white;
    border-radius:20px;

    overflow:hidden;

    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.header{
    background:linear-gradient(135deg,#f8db4c,#f06292);

    color:white;

    padding:30px;

    text-align:center;
}

.header img{
    width:90px;
    height:90px;

    border-radius:50%;

    object-fit:cover;

    margin-bottom:15px;

    border:3px solid white;
}

.form-section{
    padding:35px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#555;
    font-weight:500;
}

.input-group input,
.input-group textarea{
    width:100%;
    padding:12px;

    border:2px solid #eee;
    border-radius:10px;

    outline:none;

    transition:0.3s;
}

.input-group input:focus,
.input-group textarea:focus{
    border-color:#c2185b;
}

.btn{
    width:100%;

    background:#c2185b;
    color:white;

    border:none;

    padding:14px;

    border-radius:30px;

    cursor:pointer;

    font-size:16px;
    font-weight:600;

    transition:0.3s;
}

.btn:hover{
    background:#a3154d;
}

.link{
    text-align:center;
    margin-top:20px;
    font-size:14px;
}

.link a{
    color:#c2185b;
    text-decoration:none;
    font-weight:600;
}

.success-modal{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.5);

    display:none;
    justify-content:center;
    align-items:center;
}

.success-box{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">

        <img src="../assets/css/img/icon_worker.jpg">

        <h1>Registrasi User</h1>

        <p>
            Daftar untuk memesan jasa tukang
        </p>

    </div>

    <div class="form-section">

        <form id="registerUserForm">

            <div class="input-group">
                <label>Nama Lengkap</label>

                <input
                    type="text"
                    name="nama"
                    required>
            </div>

            <div class="input-group">
                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    required>
            </div>

            <div class="input-group">
                <label>Nomor Telepon</label>

                <input
                    type="text"
                    name="telepon"
                    required>
            </div>

            <div class="input-group">
                <label>Alamat</label>

                <textarea
                    name="alamat"
                    rows="3"
                    required></textarea>
            </div>

            <div class="input-group">
                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    required>
            </div>

            <div class="input-group">
                <label>Konfirmasi Password</label>

                <input
                    type="password"
                    id="confirmPassword"
                    required>
            </div>

            <button type="submit" class="btn">
                Daftar Sekarang
            </button>

        </form>

        <div class="link">
            Sudah punya akun?
            <a href="../login/loginUser.html">
                Login
            </a>
        </div>

    </div>

</div>

<div class="success-modal" id="successModal">

    <div class="success-box">

        <h2>Pendaftaran Berhasil</h2>

        <p>
            Sekarang kamu bisa login
        </p>

    </div>

</div>

<script>

document
.getElementById("registerUserForm")

.addEventListener("submit", function(e){

    e.preventDefault();

    const nama =
    document.querySelector('input[name="nama"]').value;

    const email =
    document.querySelector('input[name="email"]').value;

    const telepon =
    document.querySelector('input[name="telepon"]').value;

    const alamat =
    document.querySelector('textarea[name="alamat"]').value;

    const password =
    document.getElementById("password").value;

    const confirmPassword =
    document.getElementById("confirmPassword").value;


    if(password !== confirmPassword){

        alert("Password tidak cocok");
        return;
    }

    let users =
    JSON.parse(localStorage.getItem("users")) || [];


    const cekEmail =
    users.find(user => user.email === email);

    if(cekEmail){

        alert("Email sudah digunakan");
        return;
    }


    const newUser = {

        id: Date.now(),

        nama,
        email,
        telepon,
        alamat,
        password
    };

    users.push(newUser);

    localStorage.setItem(
        "users",
        JSON.stringify(users)
    );

    document
    .getElementById("successModal")
    .style.display = "flex";


    setTimeout(() => {

        window.location.href =
        "../login/loginUser.html";

    }, 1500);

});

</script>

</body>
</html>
